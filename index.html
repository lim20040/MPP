<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 스케줄 - MPP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">📅 MPP 플래너</a>
        <div class="nav-links">
            <a href="index.html" class="active">내 스케줄 보기</a>
            <a href="input.html">새 강의 입력</a>
        </div>
    </nav>

    <div class="main-container">
        <!-- 달력 영역과 상세 리스트 영역을 나누는 레이아웃 -->
        <div class="calendar-layout">
            
            <!-- 왼쪽: 깔끔해진 달력 -->
            <div class="card calendar-card" style="padding: 1.5rem;">
                <div class="calendar-header" style="margin-bottom: 1rem;">
                    <button class="calendar-nav-btn" onclick="moveCalendarMonth(-1)">‹</button>
                    <h2 id="calendarTitle">📅 학습 달력</h2>
                    <button class="calendar-nav-btn" onclick="moveCalendarMonth(1)">›</button>
                </div>
                
                <div id="rescheduleNotice" class="reschedule-notice" style="display: none;"></div>
                
                <div id="scheduleResult" class="calendar-box">
                    불러오는 중...
                </div>

                <button class="btn-generate" style="margin-top: 15px;" onclick="forceReschedule()">
                    🔄 남은 전체 일정 재분배
                </button>
            </div>

            <!-- 오른쪽: 클릭한 날짜의 상세 일정 -->
            <div class="card daily-task-card" style="padding: 1.5rem;">
                <h2 id="dailyTitle" style="margin-bottom: 1rem; color: var(--primary);">📋 일정 상세</h2>
                <div id="dailyTaskList" class="task-list">
                    달력에서 날짜를 클릭해주세요.
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
