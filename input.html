<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새 강의 입력 - MPP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">📅 MPP 플래너</a>
        <div class="nav-links">
            <a href="index.html">내 스케줄 보기</a>
            <a href="input.html" class="active">새 강의 입력</a>
        </div>
    </nav>

    <div class="main-container">

        <div class="card full-width">
            <h2>⏰ 요일별 공부 가능 시간 설정</h2>

            <div class="week-settings">
                <div class="time-input">
                    <label>일요일</label>
                    <input type="number" id="time-0" placeholder="분">
                </div>

                <div class="time-input">
                    <label>월요일</label>
                    <input type="number" id="time-1" placeholder="분">
                </div>

                <div class="time-input">
                    <label>화요일</label>
                    <input type="number" id="time-2" placeholder="분">
                </div>

                <div class="time-input">
                    <label>수요일</label>
                    <input type="number" id="time-3" placeholder="분">
                </div>

                <div class="time-input">
                    <label>목요일</label>
                    <input type="number" id="time-4" placeholder="분">
                </div>

                <div class="time-input">
                    <label>금요일</label>
                    <input type="number" id="time-5" placeholder="분">
                </div>

                <div class="time-input">
                    <label>토요일</label>
                    <input type="number" id="time-6" placeholder="분">
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📝 강의 입력</h2>

            <div class="form-group">
                <label>과목명</label>
                <input type="text" id="subject" placeholder="예: 미적분">
            </div>

            <div class="form-group">
                <label>강의명</label>
                <input type="text" id="lecture" placeholder="예: 1강 OT">
            </div>

            <div class="form-group">
                <label>강의 시간</label>
                <input type="number" id="duration" placeholder="예: 60">
            </div>

            <div class="form-group">
                <label>시작일</label>
                <input type="date" id="startDate">
            </div>

            <div class="form-group">
                <label>종료일</label>
                <input type="date" id="endDate">
            </div>

            <button class="btn-add" onclick="addLecture()">단건 강의 장바구니에 담기</button>

            <div class="subject-bulk-box">
                <label class="bulk-title">⚡ 과목별 일괄 추가</label>

                <div id="subjectBulkList">
                    <div class="subject-bulk-row">
                        <div class="bulk-field bulk-subject-field">
                            <label>과목명</label>
                            <input type="text" class="bulk-subject" placeholder="예: 미적분">
                        </div>

                        <div class="bulk-field">
                            <label>시작 강</label>
                            <input type="number" class="bulk-start" placeholder="예: 1">
                        </div>

                        <div class="bulk-field">
                            <label>끝 강</label>
                            <input type="number" class="bulk-end" placeholder="예: 30">
                        </div>

                        <div class="bulk-field">
                            <label>시작일</label>
                            <input type="date" class="bulk-start-date">
                        </div>

                        <div class="bulk-field">
                            <label>종료일</label>
                            <input type="date" class="bulk-end-date">
                        </div>

                        <button class="btn-small btn-remove" onclick="removeSubjectBulkRow(this)">삭제</button>
                    </div>
                </div>

                <button class="btn-add" style="background: #64748B; margin-top: 10px;" onclick="addSubjectBulkRow()">
                    과목 추가 +
                </button>

                <button class="btn-add" style="background: #10B981; margin-top: 10px;" onclick="expandSubjectBulkInputs()">
                    과목별 강의 시간 입력란 펼치기 👇
                </button>

                <div id="bulkExpandedArea">
                </div>

                <button id="btnConfirmBulk" class="btn-add" style="background: var(--primary); margin-top: 15px; display: none;" onclick="addExpandedLectures()">
                    입력한 강의 모두 장바구니에 담기 🛒
                </button>
            </div>
        </div>

        <div class="card">
            <h2>🛒 장바구니</h2>

            <div id="cartList">
                목록이 비어있습니다.
            </div>

            <button class="btn-generate" onclick="generateAndSave()">
                스케줄 자동 생성하기
            </button>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
