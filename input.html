<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강의 입력 - MPP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">📅 MPP PLANNER</a>
        <div class="nav-links">
            <a href="index.html">내 스케줄</a>
            <a href="input.html" class="active">새 일정 만들기</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="card full-width">
            <h2>⚙️ 요일별 공부 가능 시간 (분)</h2>
            <div class="week-settings">
                <div class="time-input"><label>월</label><input type="number" id="time-1" value="120"></div>
                <div class="time-input"><label>화</label><input type="number" id="time-2" value="120"></div>
                <div class="time-input"><label>수</label><input type="number" id="time-3" value="120"></div>
                <div class="time-input"><label>목</label><input type="number" id="time-4" value="120"></div>
                <div class="time-input"><label>금</label><input type="number" id="time-5" value="120"></div>
                <div class="time-input" style="background:#EEF2FF;"><label style="color:#4F46E5">토</label><input type="number" id="time-6" value="240"></div>
                <div class="time-input" style="background:#FFF1F2;"><label style="color:#E11D48">일</label><input type="number" id="time-0" value="240"></div>
            </div>
        </div>

        <div class="card">
            <h2>📚 과목 및 기간 설정</h2>
            <div class="form-group">
                <label>과목명</label>
                <input type="text" id="subject" placeholder="예: 미적분학, 알고리즘">
            </div>
            <div class="form-group">
                <label>강의 정보</label>
                <input type="text" id="lecture" placeholder="예: 1강 벡터, 2강 행렬">
            </div>
            <div class="form-group">
                <label>소요 시간 (분)</label>
                <input type="number" id="duration" placeholder="분 단위 입력">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>시작일</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>종료일</label>
                    <input type="date" id="endDate">
                </div>
            </div>
            <button class="btn-add" onclick="addLecture()">장바구니에 담기</button>
        </div>

        <div class="card">
            <h2>🛒 대기 중인 강의 목록</h2>
            <div id="cartList" class="list-box">목록이 비어있습니다.</div>
            <button class="btn-generate" onclick="generateAndSave()">지능형 스케줄 자동 생성 🚀</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
