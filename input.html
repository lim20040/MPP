<div style="background: #F8FAFC; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-top: 15px;">
                <label style="font-weight: 600; font-size: 0.85rem; color: #10B981; margin-bottom: 10px; display: block;">⚡ 연속 일괄 추가 (시간 개별 입력)</label>
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="bulkStart" placeholder="시작 강 (예: 30)" style="background: white;">
                    <input type="number" id="bulkEnd" placeholder="끝 강 (예: 70)" style="background: white;">
                    <button class="btn-add" style="background: #10B981; border-color: transparent;" onclick="expandBulkInputs()">시간 입력란 펼치기 👇</button>
                </div>
                
                <div id="bulkExpandedArea" style="margin-top: 15px; display: none; max-height: 250px; overflow-y: auto; padding: 10px; background: white; border: 1px solid #E2E8F0; border-radius: 8px;">
                    </div>
                
                <button id="btnConfirmBulk" class="btn-add" style="background: var(--primary); margin-top: 15px; display: none;" onclick="addExpandedLectures()">체크한 강의 모두 장바구니에 담기 🛒</button>
            </div>
