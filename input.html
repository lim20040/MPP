<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강의 입력 - MPP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">📅 MPP</a>
        <div class="nav-links">
            <a href="index.html">내 스케줄 보기</a>
            <a href="input.html" class="active">새 강의 입력</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="card">
            <h2>1. 새 강의 입력</h2>
            <input type="text" id="subject" placeholder="과목명 (예: 미적분학)">
            <input type="text" id="lecture" placeholder="강의명 (예: 1강, OT)">
            <input type="number" id="duration" placeholder="시간 (분 단위)">
            <button class="btn-add" onclick="addLecture()">목록에 담기 🛒</button>
        </div>

        <div class="card">
            <h2>2. 담긴 강의 & 스케줄 설정</h2>
            <div id="cartList" class="list-box">아직 담긴 강의가 없습니다.</div>
            
            <div style="margin-top: 20px; border-top: 2px dashed #eee; padding-top: 20px;">
                <label class="setting-label">시작 날짜</label>
                <input type="date" id="startDate">
                
                <label class="setting-label">하루 학습 가능 시간(분)</label>
                <input type="number" id="dailyLimit" placeholder="예: 120" value="120">
                
                <button class="btn-generate" onclick="generateAndSave()">날짜별 스케줄 짜기 & 저장 🚀</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
